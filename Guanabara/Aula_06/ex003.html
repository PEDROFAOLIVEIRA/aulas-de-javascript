<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu primeiro programa</title>
    <style> /* Estilos CSS para a página, CSS é o designer da página */
        body 
        {
            font-family: Arial, sans-serif;
            background-color: lch(44.98% 34.34 163.29);
            color: hsl(0, 0%, 20%);
            padding: 23px;
        }
        h1 {
            color: hsl(211, 90%, 8%);
        }
    </style>
</head>
<body>
    <h1>Olá, mundo!</h1> <!-- HTML é a estrutura da página, o esqueleto, o contéudo -->
    <p>Já me livrei da maldição, primeiro código escrevi "Olá, mundo!". Agora, este é o meu primeiro programa em HTML.</p>
    <script>
        var n1 = Number(window.prompt('Digite um número:'));
        var n2 = Number(window.prompt('Digite outro número:'));
        var s = n1 + n2;
        window.alert('A soma entre ' + n1 + ' e ' + n2 + ' é igual a ' + s);
    </script>
</body>
</html>
