<body>
    <h1>Exercício 4</h1>
    <p>Mostrar o dobro de um número</p>
    <script>
        var n1 = Number(window.prompt('Digite um número: '));
        var resultado = n1 * 2
        window.alert('O dobro de ' + n1 + ' é igual a: ' + resultado); 
    </script>
