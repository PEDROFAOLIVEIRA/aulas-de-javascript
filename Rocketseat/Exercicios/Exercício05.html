            padding: 20px;

<body>
    <h1>Exercício 5</h1>
    <p>A média entre dois números</p>
    <script>
        var n1 = Number(window.prompt('Digite um número: '));
        var n2 = Number(window.prompt('Digite o segundo número: '));
        var resultado = n1 + n2 / 2
        window.alert('O resultado da média de ' +n1+' e '+ n2 +' é: '+resultado+''); 
    </script>
    
</body>
