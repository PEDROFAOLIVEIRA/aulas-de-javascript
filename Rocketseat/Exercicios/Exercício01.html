    <h1>Exercício 01</h1>
    <p>Crie um programa que receba um número e mostre se ele é par ou ímpar.</p>
    <script>
        var nome = window.prompt('Qual seu nome?');
        window.alert('Olá, ' + nome + ', seja bem-vindo(a)!');
